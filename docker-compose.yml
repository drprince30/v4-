
services:
  ai-infra-cascade-defense:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
      - PROMETHEUS_URL=http://mock-prometheus:9090
    depends_on:
      - mock-prometheus

  mock-prometheus:
    build:
      context: .
      dockerfile: Dockerfile.mock
    ports:
      - "9090:9090"
