apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels: { app: {{ .Release.Name }} }
  template:
    metadata:
      labels: { app: {{ .Release.Name }} }
    spec:
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports: [{ containerPort: 8501 }]
          env:
            - { name: STREAMLIT_BROWSER_GATHER_USAGE_STATS, value: "false" }
            - { name: PROMETHEUS_URL, value: "{{ .Values.prometheus.url }}" }
